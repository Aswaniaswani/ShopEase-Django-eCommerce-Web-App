<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">

        <h3>Checkout</h3>

        <form method="POST">
            {% csrf_token %}

            <h5>Delivery Details</h5>

            <input name="full_name" class="form-control mb-2" placeholder="Full Name" required>
            <input name="phone" class="form-control mb-2" placeholder="Phone" required>
            <textarea name="address" class="form-control mb-2" placeholder="Address" required></textarea>
            <input name="city" class="form-control mb-2" placeholder="City" required>
            <input name="pincode" class="form-control mb-2" placeholder="Pincode" required>

            <h5>Payment Method</h5>

            <div class="form-check">
                <input type="radio" name="payment_method" value="COD" checked>
                <label>Cash on Delivery</label>
            </div>

            <div class="form-check">
                <input type="radio" name="payment_method" value="PAYPAL">
                <label>PayPal</label>
            </div>

            <button class="btn btn-success mt-3 w-100">Place Order</button>
        </form>

    </div>

</body>
</html>
