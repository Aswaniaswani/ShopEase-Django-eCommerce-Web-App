<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | ShopEase</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #111, #444);
            height: 100vh;
        }

        .card-custom {
            border-radius: 15px;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #000;
        }

        .btn-custom {
            background: black;
            color: white;
            border-radius: 8px;
        }

        .btn-custom:hover {
            background: #333;
        }

        .brand {
            position: absolute;
            top: 20px;
            left: 30px;
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="brand">ShopEase</div>

<div class="col-md-4">
    <div class="card card-custom shadow-lg p-4">

        <div class="text-center mb-3">
            <h3 class="fw-bold">Forgot Password 🔐</h3>
            <p class="text-muted">Enter your username to reset password</p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
            </div>

            <button type="submit" class="btn btn-custom w-100">
                <i class="bi bi-arrow-repeat"></i> Reset Password
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="{% url 'login' %}" class="text-decoration-none fw-bold">
                ← Back to Login
            </a>
        </div>

    </div>
</div>

</body>
</html>
