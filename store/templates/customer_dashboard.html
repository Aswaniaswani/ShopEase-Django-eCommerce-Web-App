<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        /* SIDEBAR */
        .sidebar {
            min-height: 100vh;
            background: #111;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: #ccc;
            padding: 10px;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .sidebar a:hover,
        .active-link {
            background: #333;
            color: white;
        }

        /* MOBILE FIX */
        @media (max-width: 768px) {
            .sidebar {
                min-height: auto;
                position: relative;
                width: 100%;
            }
        }

        /*  CONTENT */
        .content {
            padding: 20px;
        }

        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!--  TOGGLE BUTTON (Mobile only) -->
            <div class="d-md-none p-2">
                <button class="btn btn-dark w-100" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
                    ☰ Menu
                </button>
            </div>

            <!--  SIDEBAR -->
            <div class="col-md-3 col-lg-2 collapse d-md-block sidebar" id="sidebarMenu">

                <h4><i class="bi bi-person-circle"></i> Customer</h4><br>

                <a href="{% url 'customer_dashboard' %}" class="active-link">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>

                <a href="{% url 'product_list' %}">
                    <i class="bi bi-shop"></i> Shop
                </a>

                <a href="{% url 'orders' %}">
                    <i class="bi bi-bag-check"></i> My Orders
                </a>

                <a href="{% url 'cart' %}">
                    <i class="bi bi-cart"></i> Cart
                </a>

                <a href="{% url 'logout' %}">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>

                <hr>

                <a href="/">
                    <i class="bi bi-globe"></i> View Site
                </a>
            </div>

            <!--  CONTENT -->
            <div class="col-md-9 col-lg-10 content">

                <h3 class="mb-4">👤 My Dashboard</h3>

                <div class="row g-3">

                    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                        <div class="card p-3 shadow-sm text-center">
                            <h5>My Orders</h5>
                            <h3>{{ orders|length }}</h3>
                        </div>
                    </div>

                    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                        <div class="card p-3 shadow-sm text-center">
                            <h5>Cart Items</h5>
                            <h3>{{ cart_count }}</h3>
                        </div>
                    </div>

                </div>

                <hr>

                <div class="mt-4 d-flex flex-wrap gap-2">
                    <a href="{% url 'product_list' %}" class="btn btn-dark">🛍 Shop Now</a>
                    <a href="{% url 'orders' %}" class="btn btn-dark">📦 My Orders</a>
                    <a href="{% url 'cart' %}" class="btn btn-dark">🛒 View Cart</a>
                </div>

            </div>

        </div>
    </div>

    <!-- Bootstrap JS (IMPORTANT for toggle) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
