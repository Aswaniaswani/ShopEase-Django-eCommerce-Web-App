<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            height: 100vh;
            background: #111;
            color: white;
            padding: 20px;
            overflow-y: auto;
            transition: 0.3s;
            z-index: 1000;
        }

        .sidebar a {
            display: block;
            color: #ccc;
            padding: 10px;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .sidebar a:hover,
        .active-link {
            background: #333;
            color: white !important;
        }

        /* CONTENT */
        .content {
            margin-left: 250px;
            padding: 20px;
        }

        /* MOBILE */
        @media (max-width: 768px) {

            .sidebar {
                left: -250px; /* hide */
            }

            .sidebar.show {
                left: 0; /* show */
            }

            .content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <div class="d-md-none p-2">
                <button class="btn btn-dark w-100" onclick="toggleSidebar()">
                    ☰ Admin Menu
                </button>
            </div>
            </div>

            <!-- SIDEBAR -->
            <div class="sidebar" id="adminSidebar">

                <h4><i class="bi bi-speedometer2"></i> Admin</h4><br>

                <a href="{% url 'admin_dashboard' %}" class="active-link">
                    <i class="bi bi-house"></i> Dashboard
                </a>

                <a href="{% url 'product_list' %}">
                    <i class="bi bi-box"></i> Product List
                </a>

                <a href="{% url 'add_product' %}">
                    <i class="bi bi-plus-circle"></i> Add Product
                </a>

                <a href="{% url 'admin_orders' %}">
                    <i class="bi bi-bag-check"></i> Orders
                </a>

                <a href="{% url 'logout' %}">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>

                <hr>

                <a href="/">
                    <i class="bi bi-globe"></i> View Site
                </a>

            </div>

            <!--  CONTENT -->
            <div class="content">
                {% block content %}{% endblock %}
            </div>

        </div>
    </div>
    <script>
        function toggleSidebar() {
            document.getElementById("adminSidebar").classList.toggle("show");
        }
    </script>

    <!-- Bootstrap JS (required for collapse) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
