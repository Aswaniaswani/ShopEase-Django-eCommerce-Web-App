<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success | ShopEase</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .success-box {
            max-width: 600px;
            margin: 100px auto;
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .success-icon {
            font-size: 70px;
            color: #28a745;
        }

        .btn-custom {
            border-radius: 30px;
            padding: 10px 20px;
        }

        .order-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="success-box">

            <!--  ICON -->
            <i class="bi bi-check-circle-fill success-icon"></i>

            <!--  MESSAGE -->
            <h2 class="mt-3">Order Placed Successfully!</h2>
            <p class="text-muted">Thank you for shopping with us 🎉</p>

            <!--  ORDER INFO -->
            <div class="order-info">
                <p><strong>Status:</strong> Pending</p>
                <p><strong>Payment:</strong> {{ request.GET.payment|default:"Cash on Delivery" }}</p>
                <p><strong>Estimated Delivery:</strong> 3-5 Days</p>
            </div>

            <!--  BUTTONS -->
            <div class="mt-4 d-flex justify-content-center gap-3">

                <a href="/" class="btn btn-dark btn-custom">
                    <i class="bi bi-house"></i> Home
                </a>

                <a href="{% url 'product_list' %}" class="btn btn-outline-primary btn-custom">
                    Continue Shopping
                </a>

                <a href="{% url 'orders' %}" class="btn btn-success btn-custom">
                    My Orders
                </a>

            </div>

        </div>

    </div>

</body>
</html>
